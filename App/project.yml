name: HostsSwitchr
options:
  bundleIdPrefix: com.hostsswitchr
  deploymentTarget:
    macOS: "26.0"
packages:
  HostsKit:
    path: ../HostsKit
targets:
  HostsSwitchr:
    type: application
    platform: macOS
    sources:
      - path: Sources
    dependencies:
      - package: HostsKit
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Hosts Switchr
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "26.0"
        LSApplicationCategoryType: public.app-category.developer-tools
        LSUIElement: true
        # Prevent a second instance: concurrent privileged applies (each per-process isApplying-guarded
        # only) could otherwise both snapshot the same /etc/hosts and leave one with a stale rollback backup.
        LSMultipleInstancesProhibited: true
        NSHumanReadableCopyright: "© 2026 Thomas Guillot · MIT licensed"
    preBuildScripts:
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        script: |
          if command -v swiftlint >/dev/null 2>&1; then
            cd "$SRCROOT/.." && swiftlint lint --quiet
          else
            echo "note: SwiftLint not installed; skipping lint (brew install swiftlint)."
          fi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hostsswitchr.app
        MARKETING_VERSION: "0.2.3"
        CURRENT_PROJECT_VERSION: "6"
        SWIFT_VERSION: "6.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
